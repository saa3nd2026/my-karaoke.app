<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SCX MOBILE // v12.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=JetBrains+Mono:wght@500&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
<style>
:root { --bg: #020617; --panel: #0f172a; --accent: #3b82f6; --text: #f8fafc; --lcd: #2dd4bf; --red: #f43f5e; --border: #1e293b; --gold: #fbbf24; }
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── ログインゲート ── */
#gate { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
.gate-card { background: var(--panel); padding: 30px; border: 1px solid var(--border); border-radius: 16px; text-align: center; width: 100%; max-width: 320px; }

header { padding: 10px 15px; background: #000; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; height: 50px; }
.logo { font-family: 'JetBrains Mono'; font-size: 14px; font-weight: 900; color: var(--accent); }

main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ステージ（上半分） */
#stage { height: 40%; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 15px; background: #000; }
#bg-container { position: absolute; inset: 0; z-index: 1; opacity: 0.3; }
#bg-container img, #bg-container video { width: 100%; height: 100%; object-fit: cover; }

#lyric-display { z-index: 2; width: 100%; background: rgba(15,23,42,0.85); padding: 15px; border-radius: 12px; text-align: center; border-bottom: 3px solid var(--accent); backdrop-filter: blur(5px); }
.msg-main { font-size: 20px; font-weight: 900; display: block; }
.msg-sub { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--gold); }

/* YouTubeプレイヤー：モバイル最適化（右上固定） */
#yt-player-wrap { position: absolute; top: 10px; right: 10px; width: 120px; aspect-ratio: 16/9; background: #000; border-radius: 6px; overflow: hidden; z-index: 10; border: 1px solid var(--border); display: none; }

/* コントロール（下半分） */
aside { flex: 1; background: var(--panel); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid var(--border); }
.card { background: #000; border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
.score-lcd { font-family: 'JetBrains Mono'; font-size: 36px; color: var(--lcd); text-align: center; border: 1px solid var(--lcd); border-radius: 6px; padding: 5px; }

.fx-row { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
.fx-row label { display: flex; justify-content: space-between; font-size: 10px; color: #64748b; }
input[type="range"] { accent-color: var(--accent); height: 30px; }

.btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 700; color: white; background: #1e293b; transition: 0.1s; }
.btn-active { background: var(--accent) !important; }
.btn-warn { border: 1px solid var(--red); color: var(--red); background: transparent; }
.btn-warn.btn-active { background: var(--red) !important; color: white !important; }

#start-btn { height: 64px; font-size: 18px; background: #059669; font-weight: 900; margin-bottom: 30px; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <h2 style="color:var(--accent); margin-bottom:15px;">SCX MOBILE</h2>
    <input type="password" id="access-input" placeholder="PASSCODE" style="width:100%; padding:15px; text-align:center; background:#000; color:white; border:1px solid var(--border); border-radius:8px; margin-bottom:20px;">
    <button class="btn" style="background:var(--accent); height:50px;" onclick="unlock()">STUDIO START</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">SCX MOBILE // v12.0</div>
    <select id="mic-in" style="max-width:140px; background:#000; color:white; border:1px solid var(--border); font-size:10px; padding:4px; border-radius:4px;"></select>
  </header>

  <main>
    <section id="stage">
      <div id="bg-container"></div>
      <div id="yt-player-wrap"></div>
      <div id="lyric-display">
        <span class="msg-main" id="main-msg">STANDBY</span>
        <span class="msg-sub">SCORE ANALYZER READY</span>
      </div>
      <div id="producer-comment" style="display:none; position:absolute; bottom:10px; background:rgba(0,0,0,0.9); color:white; font-size:11px; padding:12px; border-radius:6px; z-index:10; width:90%; border-left:4px solid var(--gold);"></div>
    </section>

    <aside>
      <div class="card">
        <div class="score-lcd" id="score-num">00.00</div>
        <canvas id="viz" style="width:100%; height:40px; background:#000; margin-top:8px; border-radius:4px;"></canvas>
      </div>

      <div class="card">
        <div style="display:flex; gap:8px; margin-bottom:10px;">
          <button id="tog-mon" class="btn btn-warn" onclick="toggleFeature('mon')">MONITOR: OFF</button>
          <button id="tog-echo" class="btn btn-active" onclick="toggleFeature('echo')">ECHO: ON</button>
        </div>
        <div class="fx-row">
          <label>ECHO FEEDBACK <span id="txt-echo">25</span>%</label>
          <input type="range" id="slip-echo" min="0" max="85" value="25" oninput="updateFX()">
        </div>
      </div>

      <div class="card">
        <input type="text" id="v-url" style="width:100%; padding:12px; background:#111; color:white; border:1px solid var(--border); border-radius:6px; margin-bottom:10px; font-size:14px;" placeholder="YouTube URLを貼り付け">
        <button class="btn" style="background:var(--accent);" onclick="loadVideo()">動画マウント</button>
      </div>

      <button id="start-btn" class="btn" onclick="toggleSession()">MASTER START</button>
    </aside>
  </main>
</div>

<script>
const PASS = 'yoha_88ku99_channnnnn';
let ctx, mic, anl, dlyL, fbL, mon, stream, recorder, chunks = [], active = false, sessionMax = 0;
let feats = { mon: false, echo: true };

async function unlock() {
  if (document.getElementById('access-input').value !== PASS) return alert("AUTH ERROR");
  try {
    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
    s.getTracks().forEach(t => t.stop());
    document.getElementById('gate').style.display = 'none';
    await listMics();
  } catch (e) { alert("マイク許可が必要です"); }
}

async function listMics() {
  const ds = await navigator.mediaDevices.enumerateDevices();
  const sel = document.getElementById('mic-in');
  sel.innerHTML = "";
  ds.filter(d => d.kind === 'audioinput').forEach(d => {
    const o = document.createElement('option'); o.value = d.deviceId; o.textContent = d.label || "Mic";
    sel.appendChild(o);
  });
}

function loadVideo() {
  const url = document.getElementById('v-url').value;
  const vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : (url.includes('be/') ? url.split('be/')[1].split('?')[0] : "");
  if (vid) {
    const w = document.getElementById('yt-player-wrap'); w.style.display = 'block';
    w.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}?autoplay=1" frameborder="0"></iframe>`;
    document.getElementById('main-msg').textContent = "MOUNTED";
  }
}

async function initAudio() {
  if (ctx) await ctx.close();
  const devId = document.getElementById('mic-in').value;
  stream = await navigator.mediaDevices.getUserMedia({ 
    audio: { deviceId: devId ? { exact: devId } : undefined, echoCancellation: false } 
  });
  ctx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
  mic = ctx.createMediaStreamSource(stream);
  anl = ctx.createAnalyser(); anl.fftSize = 1024;
  mon = ctx.createGain(); dlyL = ctx.createDelay(); fbL = ctx.createGain();
  const dest = ctx.createMediaStreamDestination();
  
  mic.connect(anl); mic.connect(mon); mic.connect(dlyL); dlyL.connect(fbL); fbL.connect(dlyL);
  [mon, dlyL].forEach(n => { n.connect(ctx.destination); n.connect(dest); });
  
  recorder = new MediaRecorder(dest.stream);
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(chunks)); a.download = 'mobile_session.webm'; a.click();
    chunks = []; showAdvice();
  };
  updateFX();
}

function toggleFeature(f) {
  feats[f] = !feats[f];
  const btn = document.getElementById('tog-' + f);
  if (f === 'mon') {
    btn.classList.toggle('btn-active', feats[f]);
    btn.textContent = `MONITOR: ${feats[f] ? 'ON' : 'OFF'}`;
    if (feats[f]) alert("【注意】イヤホンなしでONにするとハウリング（キーンという音）が発生します！");
  } else {
    btn.classList.toggle('btn-active', feats[f]);
    btn.textContent = `ECHO: ${feats[f] ? 'ON' : 'OFF'}`;
  }
  updateFX();
}

function updateFX() {
  const e = document.getElementById('slip-echo').value;
  document.getElementById('txt-echo').textContent = e;
  if (ctx) {
    fbL.gain.setTargetAtTime(feats.echo ? e/100 : 0, ctx.currentTime, 0.05);
    dlyL.delayTime.setTargetAtTime(0.25, ctx.currentTime, 0.05);
    mon.gain.setTargetAtTime(feats.mon ? 0.8 : 0, ctx.currentTime, 0.05);
  }
}

function toggleSession() {
  const btn = document.getElementById('start-btn');
  if (active) {
    active = false; recorder.stop(); btn.textContent = "MASTER START"; btn.style.background = "#059669";
  } else {
    initAudio().then(() => {
      active = true; recorder.start(); btn.textContent = "STOP & SAVE"; btn.style.background = "#f43f5e";
      document.getElementById('producer-comment').style.display = "none";
      document.getElementById('main-msg').textContent = "ON AIR";
      sessionMax = 0; loop();
    });
  }
}

function loop() {
  if (!active) return; requestAnimationFrame(loop);
  const tData = new Float32Array(anl.fftSize); anl.getFloatTimeDomainData(tData);
  const rms = Math.sqrt(tData.reduce((a,b)=>a+b*b,0)/tData.length);
  const score = Math.min(100, rms * 450);
  if (score > sessionMax) sessionMax = score;
  document.getElementById('score-num').textContent = score.toFixed(2);
  const cc = document.getElementById('viz').getContext('2d');
  cc.clearRect(0,0,300,40); cc.beginPath(); cc.strokeStyle = '#2dd4bf';
  for(let i=0; i<tData.length; i++) cc.lineTo(i*(300/tData.length), (tData[i]*0.5+0.5)*40); cc.stroke();
}

function showAdvice() {
  const c = document.getElementById('producer-comment'); c.style.display = "block";
  c.textContent = "PRODUCER: " + (sessionMax > 75 ? "スマホでこのパワー、素晴らしい！" : "マイクをもっと意識して歌ってみよう。");
}

function changeBG(input) {
  const f = input.files[0]; if (!f) return;
  const u = URL.createObjectURL(f); const c = document.getElementById('bg-container'); c.innerHTML = "";
  if (f.type.startsWith('video')) {
    const v = document.createElement('video'); v.src = u; v.autoplay = v.loop = v.muted = true; c.appendChild(v);
  } else {
    const i = document.createElement('img'); i.src = u; c.appendChild(i);
  }
}
</script>
</body>
</html>
