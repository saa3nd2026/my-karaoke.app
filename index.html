<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SCX MOBILE // v11.5</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=JetBrains+Mono:wght@500&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
<style>
:root { --bg: #020617; --panel: #0f172a; --accent: #3b82f6; --text: #f8fafc; --lcd: #2dd4bf; --red: #f43f5e; --border: #1e293b; --gold: #fbbf24; }
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── ログインゲート ── */
#gate { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
.gate-card { background: var(--panel); padding: 30px; border: 1px solid var(--border); border-radius: 16px; text-align: center; width: 100%; max-width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

/* ── メインレイアウト ── */
header { padding: 10px 15px; background: #000; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; height: 50px; }
.logo { font-family: 'JetBrains Mono'; font-size: 14px; font-weight: 900; color: var(--accent); }

main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ステージ（上半分） */
#stage { height: 45%; min-height: 220px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 15px; border-bottom: 2px solid var(--border); background: #000; }
#bg-container { position: absolute; inset: 0; z-index: 1; }
#bg-container img, #bg-container video { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }

#lyric-display { z-index: 2; width: 100%; background: rgba(15,23,42,0.8); padding: 15px; border-radius: 8px; text-align: center; border-bottom: 3px solid var(--accent); }
.msg-main { font-size: 18px; font-weight: 900; display: block; margin-bottom: 5px; }
.msg-sub { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--lcd); }

/* コントロール（下半分） */
aside { flex: 1; background: var(--panel); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
.card { background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.score-lcd { font-family: 'JetBrains Mono'; font-size: 32px; color: var(--lcd); text-align: center; border: 1px solid var(--lcd); padding: 5px; border-radius: 4px; background: rgba(0,0,0,0.5); }

.fx-row { display: flex; flex-direction: column; gap: 5px; margin-top: 5px; }
.fx-row label { display: flex; justify-content: space-between; font-size: 10px; color: #64748b; }
input[type="range"] { accent-color: var(--accent); height: 25px; }

.input-field { width: 100%; padding: 10px; background: #111; color: white; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 5px; font-size: 13px; }
.btn { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: 700; color: white; background: var(--accent); font-size: 13px; }
#start-btn { height: 60px; font-size: 18px; background: #059669; margin-bottom: 20px; }

#yt-player-wrap { position: absolute; top: 10px; right: 10px; width: 100px; aspect-ratio: 16/9; background: #000; border-radius: 4px; overflow: hidden; z-index: 5; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <h2 style="color:var(--accent); margin-bottom:10px;">STUDIO CONSOL</h2>
    <p style="font-size:10px; color:#64748b; margin-bottom:20px;">モバイルスタジオを起動します</p>
    <input type="password" id="access-input" placeholder="PASSCODE" style="width:100%; padding:12px; text-align:center; background:#000; color:white; border:1px solid var(--border); border-radius:8px; margin-bottom:15px;">
    <button class="btn" onclick="startMobile()">起動・マイク許可</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">SCX MOBILE</div>
    <select id="mic-in" style="max-width:140px; background:#000; color:white; border:1px solid var(--border); font-size:10px;"></select>
  </header>

  <main>
    <section id="stage">
      <div id="bg-container"></div>
      <div id="lyric-display">
        <span class="msg-main" id="main-msg">READY</span>
        <span class="msg-sub">STAB: <span id="val-stab">0</span>% / HARM: <span id="val-harm">0</span>%</span>
      </div>
      <div id="yt-player-wrap" style="display:none;"></div>
      <div id="producer-comment" style="display:none; position:absolute; bottom:10px; background:rgba(0,0,0,0.85); color:white; font-size:10px; padding:10px; border-radius:4px; z-index:10; width:90%; border-left:3px solid var(--gold);"></div>
    </section>

    <aside>
      <div class="card">
        <div class="score-lcd" id="score-num">00.00</div>
        <canvas id="viz" style="width:100%; height:30px; background:#000; margin-top:5px;"></canvas>
      </div>

      <div class="card">
        <div class="fx-row">
          <label>ECHO FEEDBACK <span id="txt-echo">25</span>%</label>
          <input type="range" id="slip-echo" min="0" max="80" value="25" oninput="updateFX()">
        </div>
        <div class="fx-row">
          <label>MONITOR VOLUME <span id="txt-mon">80</span>%</label>
          <input type="range" id="slip-mon" min="0" max="100" value="80" oninput="updateFX()">
        </div>
      </div>

      <div class="card">
        <input type="text" id="v-url" class="input-field" placeholder="YouTube URLを貼り付け">
        <button class="btn" onclick="loadVideo()">動画を読み込む</button>
      </div>

      <button id="start-btn" class="btn" onclick="toggleSession()">MASTER START</button>
    </aside>
  </main>
</div>

<script>
const PASS = 'yoha_88ku99_channnnnn';
let ctx, mic, anl, dlyL, fbL, mon, stream, recorder, chunks = [], active = false, maxScore = 0;

async function startMobile() {
  if (document.getElementById('access-input').value !== PASS) return alert("PASS ERROR");
  try {
    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
    s.getTracks().forEach(t => t.stop());
    document.getElementById('gate').style.display = 'none';
    await listMics();
  } catch (e) { alert("マイクの許可が必要です。"); }
}

async function listMics() {
  const ds = await navigator.mediaDevices.enumerateDevices();
  const sel = document.getElementById('mic-in');
  sel.innerHTML = "";
  ds.filter(d => d.kind === 'audioinput').forEach(d => {
    const o = document.createElement('option'); o.value = d.deviceId; o.textContent = d.label || "Mic";
    sel.appendChild(o);
  });
}

function loadVideo() {
  const url = document.getElementById('v-url').value;
  const vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : (url.includes('be/') ? url.split('be/')[1].split('?')[0] : "");
  if (vid) {
    const w = document.getElementById('yt-player-wrap'); w.style.display = 'block';
    w.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}?autoplay=1" frameborder="0"></iframe>`;
    document.getElementById('main-msg').textContent = "STANDBY";
  }
}

async function initAudio() {
  if (ctx) await ctx.close();
  const devId = document.getElementById('mic-in').value;
  stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: devId ? { exact: devId } : undefined } });
  ctx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
  mic = ctx.createMediaStreamSource(stream);
  anl = ctx.createAnalyser(); anl.fftSize = 1024;
  mon = ctx.createGain(); dlyL = ctx.createDelay(); fbL = ctx.createGain();
  const dest = ctx.createMediaStreamDestination();
  mic.connect(anl); mic.connect(mon); mic.connect(dlyL); dlyL.connect(fbL); fbL.connect(dlyL);
  [mon, dlyL].forEach(n => { n.connect(ctx.destination); n.connect(dest); });
  recorder = new MediaRecorder(dest.stream);
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(chunks)); a.download = 'mobile_rec.webm'; a.click();
    chunks = []; showAdvice();
  };
  updateFX();
}

function updateFX() {
  const e = document.getElementById('slip-echo').value;
  const m = document.getElementById('slip-mon').value;
  document.getElementById('txt-echo').textContent = e;
  document.getElementById('txt-mon').textContent = m;
  if (ctx) {
    fbL.gain.setTargetAtTime(e/100, ctx.currentTime, 0.05);
    dlyL.delayTime.setTargetAtTime(0.25, ctx.currentTime, 0.05);
    mon.gain.setTargetAtTime(m/100, ctx.currentTime, 0.05);
  }
}

function toggleSession() {
  const btn = document.getElementById('start-btn');
  if (active) {
    active = false; recorder.stop(); btn.textContent = "MASTER START"; btn.style.background = "#059669";
  } else {
    initAudio().then(() => {
      active = true; recorder.start(); btn.textContent = "STOP & SAVE"; btn.style.background = "#f43f5e";
      maxScore = 0; loop();
    });
  }
}

function loop() {
  if (!active) return; requestAnimationFrame(loop);
  const tData = new Float32Array(anl.fftSize); anl.getFloatTimeDomainData(tData);
  const fData = new Uint8Array(anl.frequencyBinCount); anl.getByteFrequencyData(fData);
  const rms = Math.sqrt(tData.reduce((a,b)=>a+b*b,0)/tData.length);
  const stab = Math.max(0, 100 - (tData.reduce((a,b)=>a+Math.abs(b-rms),0)/tData.length*400));
  let harm = 0; for(let i=80; i<300; i++) harm += fData[i]; harm = Math.min(100, harm/250);
  const score = (stab*0.4) + (harm*0.4) + (Math.min(100, rms*450)*0.2);
  if (score > maxScore) maxScore = score;
  document.getElementById('score-num').textContent = score.toFixed(2);
  document.getElementById('val-stab').textContent = stab.toFixed(0);
  document.getElementById('val-harm').textContent = harm.toFixed(0);
  const cc = document.getElementById('viz').getContext('2d');
  cc.clearRect(0,0,300,30); cc.beginPath(); cc.strokeStyle = '#2dd4bf';
  for(let i=0; i<tData.length; i++) cc.lineTo(i*(300/tData.length), (tData[i]*0.5+0.5)*30); cc.stroke();
}

function showAdvice() {
  const c = document.getElementById('producer-comment'); c.style.display = "block";
  c.textContent = "PRODUCER: " + (maxScore > 75 ? "スマホでこの倍音、驚異的だ！" : "安定感はあるが、もっと声をぶつけてこい！");
}

function changeBG(input) {
  const f = input.files[0]; if (!f) return;
  const u = URL.createObjectURL(f); const c = document.getElementById('bg-container'); c.innerHTML = "";
  if (f.type.startsWith('video')) {
    const v = document.createElement('video'); v.src = u; v.autoplay = v.loop = v.muted = true; c.appendChild(v);
  } else {
    const i = document.createElement('img'); i.src = u; c.appendChild(i);
  }
}
</script>
</body>
</html>
