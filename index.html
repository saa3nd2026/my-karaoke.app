<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>STUDIO CONSOLE // v4.5</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #e2e8f0; --panel: #f1f5f9; --panel-dark: #cbd5e1; --accent: #2563eb; 
  --text: #0f172a; --text-dim: #64748b; --lcd: #10b981; --red: #dc2626; --border: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; height: 100vh; }

/* ── 押し込みボタンのアニメーション ── */
.btn { 
  padding: 10px; border: 1px solid var(--border); font-weight: 700; font-size: 11px; 
  background: #f8fafc; cursor: pointer; border-radius: 4px;
  box-shadow: 0 2px 0 var(--border);
  transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative; top: 0;
}
.btn:active { top: 1px; box-shadow: 0 1px 0 var(--border); }

/* ON状態：凹んで、内側に影が入る（PA機材の自照式スイッチ風） */
.btn.btn-active { 
  background: var(--accent); color: white; border-color: #1e40af;
  top: 2px;
  box-shadow: inset 0 3px 6px rgba(0,0,0,0.3);
  transform: scale(0.97);
}
.btn.btn-active::after {
  content: ''; position: absolute; inset: 0; 
  background: rgba(255,255,255,0.1); border-radius: 3px;
}

/* 共通レイアウト */
#app { display: flex; flex-direction: column; height: 100vh; }
header { padding: 12px 24px; display: flex; align-items: center; background: var(--panel-dark); border-bottom: 2px solid var(--border); gap: 15px; }
main { flex: 1; display: grid; grid-template-columns: 1fr 340px; overflow: hidden; }
#stage { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; background: #fff; position: relative; }
#lyric-display { font-size: clamp(20px, 4vw, 36px); font-weight: 700; text-align: center; border-bottom: 4px solid var(--panel-dark); padding: 20px; min-height: 120px; }
aside { background: var(--panel); border-left: 2px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
.card { background: var(--panel-dark); border: 1px solid var(--border); border-radius: 4px; padding: 12px; }
.label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); margin-bottom: 6px; font-weight: 700; }
.score-lcd { background: #1e293b; color: var(--lcd); padding: 10px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 40px; text-align: center; box-shadow: inset 0 2px 8px rgba(0,0,0,0.4); }

/* ゲートパネル */
#gate { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
.gate-panel { background: var(--panel); padding: 40px; border: 2px solid var(--border); border-radius: 12px; text-align: center; width: 380px; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-panel">
    <div style="font-family: 'JetBrains Mono'; font-size: 20px; font-weight: 700; margin-bottom: 20px;">STUDIO<em>CONSOL</em> LOGIN</div>
    <input type="password" id="access-input" placeholder="PASSCODE" oninput="auth()" style="width: 100%; text-align: center; padding:12px; border:1px solid var(--border); border-radius:8px;">
  </div>
</div>

<div id="app">
  <header>
    <div style="font-family: 'JetBrains Mono'; font-weight: 700;">STUDIO<em>CONSOL</em> // v4.5</div>
    <div style="margin-left: auto; display: flex; gap: 10px;">
      <div><span style="font-size:9px; display:block">INPUT (Mic)</span><select id="mic-in" onchange="initAudio(true)"></select></div>
      <div><span style="font-size:9px; display:block">OUTPUT (Speaker/HP)</span><select id="spk-out" onchange="changeOutput()"></select></div>
    </div>
  </header>

  <main>
    <section id="stage">
      <div id="lyric-display">API経由で曲を検索してください</div>
      <div id="yt-player-wrap" style="position: absolute; bottom: 20px; right: 20px; width: 300px; aspect-ratio: 16/9; background: #000; border: 2px solid var(--border); display:none;"></div>
    </section>

    <aside>
      <div class="card">
        <div class="label">GRADES // 採点</div>
        <div class="score-lcd" id="score-num">00</div>
        <canvas id="viz" style="width:100%; height:40px; background:#0f172a; margin-top:10px;"></canvas>
      </div>

      <div class="card">
        <div class="label">YOUTUBE SEARCH // 検索</div>
        <div style="display:flex; gap:4px;">
          <input type="text" id="q" placeholder="曲名・アーティスト名" style="flex:1; padding:8px;">
          <button class="btn" onclick="searchAPI()">検索</button>
        </div>
        <div id="yt-results" style="max-height:100px; overflow-y:auto; background:#fff; margin-top:5px; font-size:11px; display:none;"></div>
      </div>

      <div class="card">
        <div class="label">FX & MONITOR // 効果</div>
        <div style="display: flex; gap: 8px;">
          <button id="tog-mon" class="btn btn-active" style="flex:1" onclick="toggleFeat('mon')">MONITOR</button>
          <button id="tog-echo" class="btn btn-active" style="flex:1" onclick="toggleFeat('echo')">ECHO</button>
        </div>
      </div>

      <button id="start-btn" class="btn" style="background:#10b981; color:white; height:60px; font-size:16px;" onclick="toggle()">MASTER START</button>
    </aside>
  </main>
</div>

<script>
const API_KEY = 'AIzaSyC5KcQmz45w9ESTM6QmbvXHom8ANBbV9fc'; 
const PASS = 'yoha_88ku99_channnnnn';

let ctx, mic, anl, hp, dly, fb, mon, rec, chunks = [], stream, voiceDest, player;
let active = false, lrc = [], startT = 0, feats = { mon: true, echo: true };

function auth() { if(document.getElementById('access-input').value === PASS) document.getElementById('gate').style.display='none', loadDevices(); }

async function loadDevices() {
  try {
    const streamTest = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ds = await navigator.mediaDevices.enumerateDevices();
    const micS = document.getElementById('mic-in');
    const spkS = document.getElementById('spk-out');
    
    micS.innerHTML = ""; spkS.innerHTML = "";
    ds.forEach(d => {
      const o = document.createElement('option'); o.value = d.deviceId; o.textContent = d.label;
      if (d.kind === 'audioinput') {
        if(d.label.includes('Sony') || d.label.includes('UAB-80')) o.selected = true;
        micS.appendChild(o);
      } else if (d.kind === 'audiooutput') {
        spkS.appendChild(o);
      }
    });
    streamTest.getTracks().forEach(t => t.stop());
  } catch(e) { console.error("Device Load Error", e); }
}

async function changeOutput() {
  const deviceId = document.getElementById('spk-out').value;
  // 背景動画（Video/Audio）の出力先を切り替え
  const video = document.getElementById('video-bg');
  if (video && typeof video.setSinkId === 'function') {
    await video.setSinkId(deviceId);
  }
}

async function initAudio(force = false) {
  if (ctx && !force) return true;
  if (force && stream) stream.getTracks().forEach(t => t.stop());
  try {
    const id = document.getElementById('mic-in').value;
    stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: id ? { exact: id } : undefined, echoCancellation: false } });
    
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') await ctx.resume();

    mic = ctx.createMediaStreamSource(stream);
    hp = ctx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 100;
    anl = ctx.createAnalyser(); dly = ctx.createDelay(); fb = ctx.createGain(); mon = ctx.createGain();
    voiceDest = ctx.createMediaStreamDestination();

    mic.connect(hp); hp.connect(anl); anl.connect(dly); dly.connect(fb); fb.connect(dly); dly.connect(mon); anl.connect(mon);
    mon.connect(ctx.destination); mon.connect(voiceDest);
    
    updateFX();
    return true;
  } catch(e) { return false; }
}

function toggleFeat(f) {
  feats[f] = !feats[f];
  const btn = document.getElementById('tog-' + (f === 'mon' ? 'mon' : 'echo'));
  btn.classList.toggle('btn-active', feats[f]);
  updateFX();
}

function updateFX() {
  if(!ctx) return;
  dly.delayTime.setTargetAtTime(0.2, ctx.currentTime, 0.1);
  fb.gain.setTargetAtTime(feats.echo ? 0.35 : 0, ctx.currentTime, 0.1);
  mon.gain.setTargetAtTime(feats.mon ? 0.7 : 0, ctx.currentTime, 0.1);
}

// ── YouTube検索 API ──
async function searchAPI() {
  const q = document.getElementById('q').value;
  if(!q) return;
  const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + " カラオケ")}&type=video&maxResults=5&key=${API_KEY}`);
  const data = await res.json();
  if(!data.items) return alert("API制限またはエラーです。");
  const container = document.getElementById('yt-results');
  container.innerHTML = data.items.map(item => `
    <div style="padding:5px; border-bottom:1px solid #eee; cursor:pointer" onclick="playVideo('${item.id.videoId}', '${item.snippet.title}')">
      ${item.snippet.title}
    </div>
  `).join('');
  container.style.display = 'block';
}

function playVideo(id, title) {
  const wrap = document.getElementById('yt-player-wrap');
  wrap.style.display = 'block';
  wrap.innerHTML = `<iframe id="yt-frame" width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1&enablejsapi=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
  document.getElementById('lyric-display').textContent = title;
}

function toggle() {
  const btn = document.getElementById('start-btn');
  if(active) {
    active = false;
    btn.classList.remove('btn-active');
    btn.style.background = "#10b981";
  } else {
    initAudio().then(ok => {
      if(!ok) return;
      active = true;
      btn.classList.add('btn-active');
      btn.style.background = var(--red);
    });
  }
}

function loop() {
  if(!active) return; requestAnimationFrame(loop);
  const d = new Float32Array(anl.fftSize); anl.getFloatTimeDomainData(d);
  const cv = document.getElementById('viz'); const cc = cv.getContext('2d');
  cc.clearRect(0,0,cv.width,cv.height); cc.beginPath(); cc.strokeStyle = '#10b981';
  for(let i=0; i<d.length; i++) cc.lineTo(i*(cv.width/d.length), (d[i]*0.5+0.5)*cv.height);
  cc.stroke();
}
</script>
</body>
</html>
