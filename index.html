<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer-when-downgrade">
<title>KARAOKE.web — Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── 前回のスタイルを継承しつつ録音UIを追加 ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b; --surface:#121217; --surface2:#1c1c24; --border:rgba(255,255,255,.1);
  --text:#f4f4f5; --text2:#a1a1aa; --accent:#7c6cf8; --red:#ef4444; --green:#22c55e;
}
body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden;touch-action:manipulation}
#root{display:flex;flex-direction:column;height:100vh;max-width:1200px;margin:0 auto;padding:0 16px}

#video-bg-container{position:absolute;inset:0;z-index:-1;overflow:hidden;background:#000}
#bg-video{width:100%;height:100%;object-fit:cover;opacity:0.4;filter:blur(5px)}

#topbar{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
#main{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden}
#col-left{display:flex;flex-direction:column;border-right:1px solid var(--border);position:relative}

#lyrics-stage{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;text-shadow:0 2px 10px rgba(0,0,0,0.8)}
#lyric-curr-line{font-size:28px;font-weight:700;text-align:center}

#col-right{background:rgba(18,18,23,0.8);backdrop-filter:blur(10px);padding:20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.stat-card{background:var(--surface2);padding:12px;border-radius:12px;border:1px solid var(--border)}
.card-label{font-size:10px;text-transform:uppercase;color:var(--text2);margin-bottom:4px}
#score-val{font-size:48px;font-family:'DM Mono';text-align:center;color:var(--accent)}

/* 録音リスト用 */
#record-list{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.rec-item{background:var(--surface);padding:8px;border-radius:8px;font-size:12px;display:flex;flex-direction:column;gap:5px}
.rec-controls{display:flex;gap:5px}

.btn-primary{width:100%;padding:14px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer}
.btn-small{padding:4px 8px;font-size:10px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;cursor:pointer}

#landing{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center}
input[type=password]{padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:#fff;text-align:center}

@media(max-width:720px){ #main{grid-template-columns:1fr} #col-right{position:absolute;bottom:0;left:0;right:0;height:40%;z-index:100} }
</style>
</head>
<body>

<div id="landing">
  <div style="font-size:32px;margin-bottom:20px;font-weight:700">KARAOKE<em>.web</em></div>
  <input type="password" id="access-code" placeholder="ACCESS CODE" oninput="checkAuth()">
</div>

<div id="video-bg-container"><video id="bg-video" muted loop playsinline></video></div>

<div id="root">
  <div id="topbar">
    <div style="font-weight:700">KARAOKE<em>.web</em></div>
    <select id="mic-select" onchange="initAudio(true)" style="margin-left:auto;background:#000;color:#fff;font-size:12px"></select>
  </div>

  <div id="main">
    <div id="col-left">
      <div style="padding:10px;display:flex;gap:5px">
        <button class="btn-small" onclick="showPanel('yt')">YouTube</button>
        <button class="btn-small" onclick="showPanel('file')">File</button>
      </div>

      <div id="p-yt" style="display:none;padding:10px">
        <input type="text" id="yt-search" placeholder="Search song..." style="width:70%;padding:5px">
        <button onclick="searchYT()" class="btn-small">Search</button>
        <div id="yt-player" style="margin-top:10px;aspect-ratio:16/9;background:#000"></div>
      </div>

      <div id="p-file" style="display:none;padding:10px">
        <input type="file" accept="audio/*,video/*" onchange="loadFile(event)">
        <input type="file" accept=".lrc" onchange="loadLRC(event)">
      </div>

      <div id="lyrics-stage">
        <div id="lyric-curr-line">START TO SING</div>
        <div id="progress-outer" style="width:100%;height:4px;background:var(--surface3);margin-top:20px"><div id="progress-inner" style="height:100%;width:0%;background:var(--accent)"></div></div>
      </div>
    </div>

    <div id="col-right">
      <div class="stat-card">
        <div class="card-label">Score</div>
        <div id="score-val">00</div>
      </div>

      <div class="stat-card">
        <div class="card-label">Recordings</div>
        <div id="record-list"></div>
      </div>

      <div class="stat-card">
        <div class="card-label">Echo</div>
        <input type="range" id="fx-echo" style="width:100%" value="35">
      </div>

      <button id="start-btn" class="btn-primary" onclick="togglePlay()">▶ START</button>
    </div>
  </div>
</div>

<audio id="player" style="display:none"></audio>

<script>
const CODE = 'yoha_88ku99_channnnnn';
let audioCtx, mic, analyser, noiseFilter, delay, feedback, monitor, stream;
let isRunning = false, lrc = [], startTime = 0;
let mediaRecorder, recordedChunks = [];
let voiceOnlyDest; // ボーカルのみ保存用

function checkAuth() {
  if(document.getElementById('access-code').value === CODE) {
    document.getElementById('landing').style.display = 'none';
    updateDeviceList();
  }
}

function showPanel(id) {
  document.getElementById('p-yt').style.display = id === 'yt' ? 'block' : 'none';
  document.getElementById('p-file').style.display = id === 'file' ? 'block' : 'none';
}

async function updateDeviceList() {
  await navigator.mediaDevices.getUserMedia({ audio: true });
  const devices = await navigator.mediaDevices.enumerateDevices();
  const select = document.getElementById('mic-select');
  devices.filter(d => d.kind === 'audioinput').forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.deviceId; opt.textContent = d.label; select.appendChild(opt);
  });
}

async function initAudio(force = false) {
  if (audioCtx && !force) return true;
  try {
    const deviceId = document.getElementById('mic-select').value;
    stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: deviceId ? { exact: deviceId } : undefined } });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    mic = audioCtx.createMediaStreamSource(stream);
    
    noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = "highpass"; noiseFilter.frequency.value = 100;
    
    analyser = audioCtx.createAnalyser();
    delay = audioCtx.createDelay();
    feedback = audioCtx.createGain();
    monitor = audioCtx.createGain();
    
    // ボーカルのみ保存用のノード
    voiceOnlyDest = audioCtx.createMediaStreamDestination();

    mic.connect(noiseFilter);
    noiseFilter.connect(analyser);
    
    // エコー等の処理
    analyser.connect(delay);
    delay.connect(feedback);
    feedback.connect(delay);
    delay.connect(monitor);
    analyser.connect(monitor);
    
    // 出力（スピーカー）と、録音用（ボーカルのみ）に接続
    monitor.connect(audioCtx.destination);
    monitor.connect(voiceOnlyDest);

    return true;
  } catch(e) { return false; }
}

function togglePlay() {
  const btn = document.getElementById('start-btn');
  if(isRunning) {
    isRunning = false;
    mediaRecorder.stop();
    document.getElementById('bg-video').pause();
    btn.textContent = "▶ START";
    btn.style.background = "var(--accent)";
  } else {
    initAudio().then(ok => {
      if(!ok) return;
      isRunning = true;
      startTime = Date.now();
      btn.textContent = "■ STOP & SAVE";
      btn.style.background = "var(--red)";
      document.getElementById('bg-video').play();
      startRecording();
      requestAnimationFrame(loop);
    });
  }
}

function startRecording() {
  recordedChunks = [];
  // monitorノード（エフェクト後の歌声）のみを録音
  mediaRecorder = new MediaRecorder(voiceOnlyDest.stream);
  mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = saveRecording;
  mediaRecorder.start();
}

function saveRecording() {
  const blob = new Blob(recordedChunks, { type: 'audio/webm' });
  const url = URL.createObjectURL(blob);
  const timestamp = new Date().toLocaleTimeString();
  
  const div = document.createElement('div');
  div.className = 'rec-item';
  div.innerHTML = `
    <span>Recording ${timestamp}</span>
    <div class="rec-controls">
      <button class="btn-small" onclick="new Audio('${url}').play()">Play</button>
      <a href="${url}" download="karaoke_vocal_${Date.now()}.webm" class="btn-small" style="text-decoration:none;color:inherit">Download</a>
    </div>
  `;
  document.getElementById('record-list').prepend(div);
}

function loop() {
  if(!isRunning) return;
  const data = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(data);
  
  // 簡易採点
  let sum = 0; for(let i=0; i<data.length; i++) sum += data[i]*data[i];
  const rms = Math.sqrt(sum/data.length);
  if(rms > 0.05) {
    const s = document.getElementById('score-val');
    s.textContent = Math.min(99, parseInt(s.textContent) + (Math.random() > 0.9 ? 1 : 0));
  }

  const now = (Date.now() - startTime) / 1000;
  const line = lrc.findLast(l => l.t <= now);
  if(line) document.getElementById('lyric-curr-line').textContent = line.txt;
  
  requestAnimationFrame(loop);
}

function searchYT() {
  const q = document.getElementById('yt-search').value;
  const origin = encodeURIComponent(window.location.origin === "null" ? "*" : window.location.origin);
  document.getElementById('yt-player').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(q + " karaoke")}&origin=${origin}&autoplay=1" frameborder="0" allowfullscreen></iframe>`;
}

function loadFile(e) {
  const url = URL.createObjectURL(e.target.files[0]);
  document.getElementById('bg-video').src = url;
}

function loadLRC(e) {
  const reader = new FileReader();
  reader.onload = f => {
    lrc = f.target.result.split('\n').map(line => {
      const m = line.match(/\[(\d+):(\d+)\.(\d+)\](.*)/);
      return m ? { t: parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/100, txt: m[4].trim() } : null;
    }).filter(x => x);
  };
  reader.readAsText(e.target.files[0]);
}
</script>
</body>
</html>
