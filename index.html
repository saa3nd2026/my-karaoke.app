<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>STUDIO CONSOL // v9.6 HARD</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=JetBrains+Mono:wght@500&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
<style>
/* スタイルは前バージョンを継承しつつ、LCDの色味をよりプロ向けに調整 */
:root { --bg: #0f172a; --panel: #1e293b; --accent: #3b82f6; --text: #f8fafc; --lcd: #2dd4bf; --red: #f43f5e; --border: #334155; --gold: #fbbf24; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; height: 100vh; }
#app { display: flex; flex-direction: column; height: 100vh; }
header { padding: 12px 24px; display: flex; align-items: center; background: #0f172a; border-bottom: 2px solid var(--border); gap: 20px; z-index: 10; }
main { flex: 1; display: grid; grid-template-columns: 1fr 340px; overflow: hidden; }

#stage { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; position: relative; overflow: hidden; background: #020617; }
#bg-container { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
#bg-container img, #bg-container video { width: 100%; height: 100%; object-fit: cover; opacity: 0.2; }

#lyric-display { font-size: 28px; font-weight: 900; text-align: center; border-bottom: 4px solid var(--accent); padding: 20px; min-height: 140px; display: flex; flex-direction: column; justify-content: center; z-index: 2; width: 85%; background: rgba(15, 23, 42, 0.8); border-radius: 12px; backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
#combo-view { color: var(--gold); font-family: 'JetBrains Mono'; font-size: 18px; margin-top: 10px; }

#producer-comment { margin-top: 25px; padding: 20px; background: rgba(30, 41, 59, 0.95); color: #fff; border-radius: 12px; font-size: 14px; z-index: 2; border-left: 5px solid var(--gold); max-width: 80%; line-height: 1.7; display: none; }

aside { background: var(--panel); border-left: 2px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; z-index: 10; }
.card { background: #0f172a; border: 1px solid var(--border); border-radius: 6px; padding: 15px; }
.label { font-size: 10px; font-family: 'JetBrains Mono'; color: #94a3b8; margin-bottom: 10px; display: block; }
.score-lcd { background: #020617; color: var(--lcd); padding: 15px; border-radius: 6px; font-family: 'JetBrains Mono'; font-size: 48px; text-align: center; letter-spacing: -2px; border: 1px solid var(--border); }

.fx-control { margin-bottom: 12px; }
.fx-control label { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; }
input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent); }

.btn { padding: 12px; border: 1px solid var(--border); font-weight: 700; font-size: 12px; background: #1e293b; color: white; cursor: pointer; border-radius: 6px; box-shadow: 0 4px 0 #0f172a; transition: 0.1s; position: relative; }
.btn:active { top: 2px; box-shadow: 0 2px 0 #0f172a; }
#start-btn { background: #059669; color: white; height: 70px; font-size: 18px; width: 100%; font-weight: 900; margin-top: auto; border: none; }
canvas { width: 100%; height: 60px; background: #020617; border-radius: 4px; margin-top: 10px; border: 1px solid var(--border); }
</style>
</head>
<body>

<div id="gate" style="position:fixed; inset:0; z-index:9999; background:var(--bg); display:flex; align-items:center; justify-content:center;">
  <div style="background:var(--panel); padding:50px; border:2px solid var(--border); border-radius:16px; text-align:center; width:420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
    <h2 style="margin-bottom:20px; letter-spacing: 2px;">STUDIO CONSOL v9.6</h2>
    <input type="password" id="access-input" placeholder="PASSCODE" style="width:100%; padding:15px; text-align:center; margin-bottom:20px; border-radius:8px; border:1px solid var(--border); font-size:18px; background:#0f172a; color:white;">
    <button class="btn" style="width:100%; background:var(--accent); color:white; height:50px;" onclick="unlock()">INITIALIZE SYSTEM</button>
  </div>
</div>

<div id="app">
  <header>
    <div style="font-weight:900; font-size:20px; color:var(--accent);">STUDIO<em>CONSOL</em> // v9.6 HARD</div>
    <div style="margin-left:auto; display:flex; gap:20px;">
      <select id="mic-in" style="width:200px; padding:8px; border-radius:4px; border:1px solid var(--border); background:#0f172a; color:white; font-size:12px;"></select>
      <button class="btn" style="padding:5px 15px;" onclick="document.getElementById('bg-upload').click()">STAGE CONFIG</button>
      <input type="file" id="bg-upload" hidden accept="image/*,video/*" onchange="changeBG(this)">
    </div>
  </header>

  <main>
    <section id="stage">
      <div id="bg-container"></div>
      <div id="lyric-display">
        <span id="main-msg">HARD MODE ACTIVE</span>
        <span id="combo-view">COMBO 0</span>
      </div>
      <div id="producer-comment"></div>
      <div id="yt-player-wrap" style="position: absolute; bottom: 30px; right: 30px; width: 360px; aspect-ratio: 16/9; background: #000; display:none; border-radius: 8px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.8);"></div>
    </section>

    <aside>
      <div class="card">
        <span class="label">PRECISION SCORING ANALYZER</span>
        <div class="score-lcd" id="score-num">00.00</div>
        <canvas id="viz"></canvas>
      </div>

      <div class="card">
        <span class="label">AUDIO CONSOLE</span>
        <div class="fx-control">
          <label>ECHO LEVEL <span id="val-echo">25</span>%</label>
          <input type="range" id="slip-echo" min="0" max="80" value="25" oninput="updateFX()">
        </div>
        <div class="fx-control">
          <label>ROOM SIZE <span id="val-time">0.2</span>s</label>
          <input type="range" id="slip-time" min="0.05" max="0.8" step="0.05" value="0.2" oninput="updateFX()">
        </div>
        <div class="fx-control">
          <label>OUTPUT GAIN <span id="val-mon">80</span>%</label>
          <input type="range" id="slip-mon" min="0" max="100" value="80" oninput="updateFX()">
        </div>
      </div>

      <div class="card">
        <input type="text" id="q" placeholder="Song Search" style="width:100%; padding:10px; margin-bottom:10px; border-radius:4px; border:1px solid var(--border); background:#0f172a; color:white;">
        <button class="btn" style="width:100%; margin-bottom:10px;" onclick="window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(document.getElementById('q').value+' カラオケ'),'_blank')">FIND SOURCE</button>
        <input type="text" id="v-url" placeholder="YouTube URL" style="width:100%; padding:10px; margin-bottom:10px; border-radius:4px; border:1px solid var(--border); background:#0f172a; color:white;">
        <button class="btn" style="width:100%;" onclick="loadVideo()">MOUNT</button>
      </div>

      <button id="start-btn" class="btn" onclick="masterAction()">MASTER START</button>
    </aside>
  </main>
</div>

<script>
const PASS = 'yoha_88ku99_channnnnn';
let ctx, mic, anl, dlyL, dlyR, fbL, fbR, mon, stream, recorder, chunks = [];
let active = false, maxScore = 0, currentCombo = 0, peakCombo = 0, startTime = 0;

async function unlock() {
  if (document.getElementById('access-input').value !== PASS) return alert("ACCESS DENIED");
  try {
    const d = await navigator.mediaDevices.getUserMedia({ audio: true });
    d.getTracks().forEach(t => t.stop());
    document.getElementById('gate').style.display = 'none';
    await refreshDevices();
  } catch (e) { alert("PERMISSION ERROR"); }
}

async function refreshDevices() {
  const ds = await navigator.mediaDevices.enumerateDevices();
  const sel = document.getElementById('mic-in');
  sel.innerHTML = "";
  ds.filter(d => d.kind === 'audioinput').forEach(d => {
    const o = document.createElement('option'); o.value = d.deviceId;
    o.textContent = d.label || "External Input";
    if(d.label.includes('Sony') || d.label.includes('UAB-80') || d.label.includes('Built-in')) o.selected = true;
    sel.appendChild(o);
  });
}

async function setupAudio() {
  if (ctx) await ctx.close();
  const devId = document.getElementById('mic-in').value;
  stream = await navigator.mediaDevices.getUserMedia({ 
    audio: { 
      deviceId: devId ? { exact: devId } : undefined,
      echoCancellation: false, 
      noiseSuppression: false,
      autoGainControl: false
    } 
  });

  ctx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
  mic = ctx.createMediaStreamSource(stream);
  anl = ctx.createAnalyser(); anl.fftSize = 2048; // 解析精度を向上
  mon = ctx.createGain();
  dlyL = ctx.createDelay(); dlyR = ctx.createDelay();
  fbL = ctx.createGain(); fbR = ctx.createGain();
  
  const dest = ctx.createMediaStreamDestination();
  mic.connect(anl); mic.connect(mon);
  mic.connect(dlyL); dlyL.connect(fbL); fbL.connect(dlyR); dlyR.connect(fbR); fbR.connect(dlyL);
  [mon, dlyL, dlyR].forEach(n => { n.connect(ctx.destination); n.connect(dest); });

  recorder = new MediaRecorder(dest.stream, { mimeType: 'audio/webm;codecs=opus' });
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    const b = new Blob(chunks, { type: 'audio/webm' }); chunks = [];
    const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'session_'+Date.now()+'.webm'; a.click();
    showProAdvice();
  };
  updateFX();
}

function updateFX() {
  const e = document.getElementById('slip-echo').value;
  const t = document.getElementById('slip-time').value;
  const m = document.getElementById('slip-mon').value;
  document.getElementById('val-echo').textContent = e;
  document.getElementById('val-time').textContent = t;
  document.getElementById('val-mon').textContent = m;
  if (ctx) {
    const g = e / 100;
    fbL.gain.setTargetAtTime(g, ctx.currentTime, 0.05);
    fbR.gain.setTargetAtTime(g, ctx.currentTime, 0.05);
    dlyL.delayTime.setTargetAtTime(parseFloat(t), ctx.currentTime, 0.05);
    dlyR.delayTime.setTargetAtTime(parseFloat(t) * 1.5, ctx.currentTime, 0.05);
    mon.gain.setTargetAtTime(m / 100, ctx.currentTime, 0.05);
  }
}

function masterAction() {
  const btn = document.getElementById('start-btn');
  if (active) {
    active = false; recorder.stop(); btn.textContent = "MASTER START"; btn.style.background = "#059669";
  } else {
    setupAudio().then(() => {
      active = true; recorder.start(); btn.textContent = "STOP & ARCHIVE"; btn.style.background = "#f43f5e";
      document.getElementById('producer-comment').style.display = "none";
      document.getElementById('main-msg').textContent = "ON AIR";
      maxScore = 0; currentCombo = 0; peakCombo = 0; startTime = Date.now(); loop();
    });
  }
}

function loop() {
  if (!active) return; requestAnimationFrame(loop);
  const d = new Float32Array(anl.fftSize); anl.getFloatTimeDomainData(d);
  
  // ── シビアな採点ロジック ──
  const rms = Math.sqrt(d.reduce((a,b)=>a+b*b,0)/d.length);
  // ノイズゲート処理: 0.01以下の微小な音は無視
  const filteredRMS = rms < 0.01 ? 0 : rms;
  
  // スコア変換: 以前より倍率を下げ、ダイナミックレンジを広く取る
  // 0.35の振幅でようやく100点に届く計算（以前はもっと低かった）
  let vol = Math.min(filteredRMS * 280, 100);
  
  // 安定性減点: 波形の分散（ガタつき）が大きいとスコアを下げる
  const variance = d.reduce((a,b) => a + Math.abs(b - rms), 0) / d.length;
  if (vol > 10) {
    vol -= (variance * 50); // ガタつきへのペナルティ
    if (vol < 0) vol = 0;
  }

  if (vol > 15) { // 歌っていると判定する閾値
    currentCombo++;
    if (currentCombo > peakCombo) peakCombo = currentCombo;
  } else {
    currentCombo = 0;
    vol *= 0.8; // 無音時はスコアが急減
  }

  if (vol > maxScore) maxScore = vol;
  document.getElementById('score-num').textContent = vol.toFixed(2);
  document.getElementById('combo-view').textContent = `COMBO ${currentCombo}`;
  
  const cc = document.getElementById('viz').getContext('2d');
  cc.clearRect(0,0,300,60); cc.beginPath(); cc.lineWidth = 2; cc.strokeStyle = '#2dd4bf';
  for(let i=0; i<d.length; i++) cc.lineTo(i*(300/d.length), (d[i]*0.5+0.5)*60); cc.stroke();
}

function showProAdvice() {
  const c = document.getElementById('producer-comment');
  const m = document.getElementById('main-msg');
  c.style.display = "block";
  
  let title = "", body = "";
  if (maxScore > 92 && peakCombo > 500) {
    title = "【伝説の歌い手か？】";
    body = `このハードモードで${maxScore.toFixed(1)}点、${peakCombo}コンボは異常だ。ピッチ、声量、安定感すべてがハイレベル。Sonyの機材がようやく本気を出せたと言ってるよ。`;
  } else if (maxScore > 75) {
    title = "【実力は本物だ】";
    body = `いいだろう。${maxScore.toFixed(1)}点。無駄な力みがなく、マイクを使いこなせている。ただ、コンボが${peakCombo}で途切れたあたり、集中力の維持が課題だな。`;
  } else {
    title = "【修行し直してこい】";
    body = `100点が出なくなった途端これか？ スコア${maxScore.toFixed(1)}。声が震えているし、ノイズ交じりだ。まずは腹式呼吸で一本の芯を通せ。話はそれからだ。`;
  }
  
  m.textContent = title;
  c.innerHTML = `<strong>PRODUCER INSIGHT:</strong><br>${body}`;
}

function loadVideo() {
  const url = document.getElementById('v-url').value;
  const vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('be/')[1].split('?')[0];
  if (vid) {
    const w = document.getElementById('yt-player-wrap'); w.style.display = 'block';
    w.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}?autoplay=1" frameborder="0" allow="autoplay; fullscreen"></iframe>`;
    document.getElementById('main-msg').textContent = "STANDBY";
  }
}

function changeBG(input) {
  const f = input.files[0]; if (!f) return;
  const u = URL.createObjectURL(f); const c = document.getElementById('bg-container'); c.innerHTML = "";
  if (f.type.startsWith('video')) {
    const v = document.createElement('video'); v.src = u; v.autoplay = v.loop = v.muted = true; c.appendChild(v);
  } else {
    const i = document.createElement('img'); i.src = u; c.appendChild(i);
  }
}
</script>
</body>
</html>
