<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>STUDIO CONSOL // v9.0 FX-SLIDER</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=JetBrains+Mono:wght@500&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
<style>
:root { --bg: #e2e8f0; --panel: #f1f5f9; --accent: #2563eb; --text: #0f172a; --lcd: #10b981; --red: #ef4444; --border: #94a3b8; --gold: #f59e0b; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; height: 100vh; }
#app { display: flex; flex-direction: column; height: 100vh; }
header { padding: 12px 24px; display: flex; align-items: center; background: #cbd5e1; border-bottom: 2px solid var(--border); gap: 20px; z-index: 10; }
main { flex: 1; display: grid; grid-template-columns: 1fr 340px; overflow: hidden; }

/* ── ステージ ── */
#stage { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; position: relative; overflow: hidden; background: #fff; }
#bg-container { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
#bg-container img, #bg-container video { width: 100%; height: 100%; object-fit: cover; opacity: 0.35; }
#lyric-display { font-size: 24px; font-weight: 900; text-align: center; border-bottom: 4px solid #cbd5e1; padding: 20px; min-height: 120px; display: flex; align-items: center; z-index: 2; width: 85%; background: rgba(255,255,255,0.85); border-radius: 8px; backdrop-filter: blur(5px); }

/* ── スライダー ── */
.fx-control { margin-top: 10px; }
.fx-control label { display: flex; justify-content: space-between; font-size: 9px; font-family: 'JetBrains Mono'; margin-bottom: 4px; color: var(--text-dim); }
input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent); }

aside { background: var(--panel); border-left: 2px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; z-index: 10; }
.card { background: #cbd5e1; border: 1px solid var(--border); border-radius: 4px; padding: 12px; }
.score-lcd { background: #1e293b; color: var(--lcd); padding: 10px; border-radius: 4px; font-family: 'JetBrains Mono'; font-size: 42px; text-align: center; box-shadow: inset 0 2px 8px rgba(0,0,0,0.4); }

.btn { padding: 10px; border: 1px solid var(--border); font-weight: 700; font-size: 11px; background: #f8fafc; cursor: pointer; border-radius: 4px; box-shadow: 0 3px 0 var(--border); transition: 0.1s; position: relative; outline: none; }
.btn:active { top: 2px; box-shadow: 0 1px 0 var(--border); }
#start-btn { background: #10b981; color: white; height: 64px; font-size: 16px; width: 100%; font-weight: 900; margin-top: auto; }
canvas { width: 100%; height: 50px; background: #0f172a; border-radius: 2px; }
</style>
</head>
<body>

<div id="gate" style="position:fixed; inset:0; z-index:9999; background:var(--bg); display:flex; align-items:center; justify-content:center;">
  <div style="background:var(--panel); padding:40px; border:2px solid var(--border); border-radius:12px; text-align:center; width:380px;">
    <h2 style="margin-bottom:20px;">STUDIO CONSOL v9.0</h2>
    <input type="password" id="access-input" placeholder="PASSCODE" style="width:100%; padding:12px; text-align:center; margin-bottom:15px; border-radius:4px; border:1px solid var(--border);">
    <button class="btn" style="width:100%; background:var(--accent); color:white;" onclick="unlock()">システム起動</button>
  </div>
</div>

<div id="app">
  <header>
    <div style="font-weight:900;">STUDIO<em>CONSOL</em> // v9.0</div>
    <div style="margin-left:auto; display:flex; gap:15px;">
      <select id="mic-in" style="width:180px; font-size:10px; padding:5px;"></select>
      <button class="btn" onclick="document.getElementById('bg-upload').click()">BG LOAD</button>
      <input type="file" id="bg-upload" hidden accept="image/*,video/*" onchange="changeBG(this)">
    </div>
  </header>
  <main>
    <section id="stage">
      <div id="bg-container"></div>
      <div id="lyric-display">READY TO SING</div>
      <div id="producer-comment" style="display:none; margin-top:20px; padding:15px; background:rgba(30,41,59,0.9); color:white; border-radius:8px; font-size:12px; z-index:2; border-left:4px solid var(--gold); max-width:80%;"></div>
      <div id="yt-player-wrap" style="position: absolute; bottom: 20px; right: 20px; width: 320px; aspect-ratio: 16/9; background: #000; display:none; z-index: 5;"></div>
    </section>
    <aside>
      <div class="card">
        <div class="score-lcd" id="score-num">00.00</div>
        <canvas id="viz" style="margin-top:10px;"></canvas>
      </div>

      <div class="card">
        <div class="fx-control">
          <label>ECHO DEPTH <span id="val-echo">35</span>%</label>
          <input type="range" id="slip-echo" min="0" max="90" value="35" oninput="updateFX()">
        </div>
        <div class="fx-control">
          <label>ECHO TIME <span id="val-time">0.25</span>s</label>
          <input type="range" id="slip-time" min="0.05" max="1.0" step="0.05" value="0.25" oninput="updateFX()">
        </div>
        <div class="fx-control">
          <label>MONITOR VOL <span id="val-mon">80</span>%</label>
          <input type="range" id="slip-mon" min="0" max="100" value="80" oninput="updateFX()">
        </div>
      </div>

      <div class="card">
        <input type="text" id="q" placeholder="曲名を検索" style="width:100%; padding:8px; margin-bottom:8px; border-radius:4px; border:1px solid var(--border);">
        <button class="btn" style="width:100%;" onclick="window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(document.getElementById('q').value+' カラオケ'),'_blank')">YouTubeで探す</button>
      </div>
      <div class="card">
        <input type="text" id="v-url" placeholder="動画URLをペースト" style="width:100%; padding:8px; margin-bottom:8px; border-radius:4px; border:1px solid var(--border);">
        <button class="btn" style="width:100%;" onclick="loadVideo()">動画読込</button>
      </div>
      <button id="start-btn" class="btn" onclick="masterAction()">MASTER START</button>
    </aside>
  </main>
</div>

<script>
const PASS = 'yoha_88ku99_channnnnn';
let ctx, mic, anl, dlyL, dlyR, fbL, fbR, mon, stream, recorder, chunks = [];
let active = false, maxScore = 0;

async function unlock() {
  if (document.getElementById('access-input').value !== PASS) return alert("PASS ERROR");
  try {
    const dummy = await navigator.mediaDevices.getUserMedia({ audio: true });
    dummy.getTracks().forEach(t => t.stop());
    document.getElementById('gate').style.display = 'none';
    await refreshMics();
  } catch (e) { alert("マイク許可が必要です"); }
}

async function refreshMics() {
  const ds = await navigator.mediaDevices.enumerateDevices();
  const sel = document.getElementById('mic-in');
  sel.innerHTML = "";
  ds.filter(d => d.kind === 'audioinput').forEach(d => {
    const o = document.createElement('option'); o.value = d.deviceId; o.textContent = d.label || "USB MIC";
    if(d.label.includes('Sony') || d.label.includes('UAB-80')) o.selected = true;
    sel.appendChild(o);
  });
}

function loadVideo() {
  const url = document.getElementById('v-url').value;
  const vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('be/')[1];
  if (vid) {
    const w = document.getElementById('yt-player-wrap'); w.style.display = 'block';
    w.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}?autoplay=1" frameborder="0" allow="autoplay; fullscreen"></iframe>`;
    document.getElementById('lyric-display').textContent = "動画ロード完了";
  }
}

async function setupAudio() {
  if (ctx) await ctx.close();
  const deviceId = document.getElementById('mic-in').value;
  stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: deviceId ? { exact: deviceId } : undefined } });
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  mic = ctx.createMediaStreamSource(stream);
  anl = ctx.createAnalyser();
  mon = ctx.createGain();
  dlyL = ctx.createDelay(); dlyR = ctx.createDelay();
  fbL = ctx.createGain(); fbR = ctx.createGain();
  const dest = ctx.createMediaStreamDestination();
  mic.connect(anl); mic.connect(mon);
  mic.connect(dlyL); dlyL.connect(fbL); fbL.connect(dlyR); dlyR.connect(fbR); fbR.connect(dlyL);
  [mon, dlyL, dlyR].forEach(n => { n.connect(ctx.destination); n.connect(dest); });
  recorder = new MediaRecorder(dest.stream);
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    const b = new Blob(chunks, { type: 'audio/webm' }); chunks = [];
    const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'recording.webm'; a.click();
    showAdvice();
  };
  updateFX();
}

function updateFX() {
  const echoVal = document.getElementById('slip-echo').value;
  const timeVal = document.getElementById('slip-time').value;
  const monVal = document.getElementById('slip-mon').value;
  document.getElementById('val-echo').textContent = echoVal;
  document.getElementById('val-time').textContent = timeVal;
  document.getElementById('val-mon').textContent = monVal;
  if (ctx) {
    const g = echoVal / 100;
    fbL.gain.setTargetAtTime(g, ctx.currentTime, 0.1);
    fbR.gain.setTargetAtTime(g, ctx.currentTime, 0.1);
    dlyL.delayTime.setTargetAtTime(parseFloat(timeVal), ctx.currentTime, 0.1);
    dlyR.delayTime.setTargetAtTime(parseFloat(timeVal) * 1.5, ctx.currentTime, 0.1);
    mon.gain.setTargetAtTime(monVal / 100, ctx.currentTime, 0.1);
  }
}

function masterAction() {
  const btn = document.getElementById('start-btn');
  if (active) {
    active = false; recorder.stop(); btn.textContent = "MASTER START"; btn.style.background = "#10b981";
  } else {
    setupAudio().then(() => {
      active = true; recorder.start(); btn.textContent = "STOP & SAVE"; btn.style.background = "#ef4444";
      document.getElementById('producer-comment').style.display = "none";
      maxScore = 0; loop();
    }).catch(e => alert("MIC ERROR"));
  }
}

function loop() {
  if (!active) return; requestAnimationFrame(loop);
  const d = new Float32Array(anl.fftSize); anl.getFloatTimeDomainData(d);
  const rms = Math.sqrt(d.reduce((a,b)=>a+b*b,0)/d.length);
  const vol = Math.min(rms * 500, 100);
  if(vol > maxScore) maxScore = vol;
  document.getElementById('score-num').textContent = vol.toFixed(2);
  const cc = document.getElementById('viz').getContext('2d');
  cc.clearRect(0,0,300,50); cc.beginPath(); cc.strokeStyle = '#10b981';
  for(let i=0; i<d.length; i++) cc.lineTo(i*(300/d.length), (d[i]*0.5+0.5)*50); cc.stroke();
}

function showAdvice() {
  const c = document.getElementById('producer-comment'); c.style.display = "block";
  let msg = maxScore > 70 ? "プロ級の響きだ！" : (maxScore > 40 ? "悪くない、もっと魂を込めろ！" : "まずは大きな声を出すことから始めよう。");
  c.textContent = "PRODUCER: " + msg;
}

function changeBG(input) {
  const f = input.files[0]; if (!f) return;
  const u = URL.createObjectURL(f); const c = document.getElementById('bg-container'); c.innerHTML = "";
  if (f.type.startsWith('video')) {
    const v = document.createElement('video'); v.src = u; v.autoplay = v.loop = v.muted = true; c.appendChild(v);
  } else {
    const i = document.createElement('img'); i.src = u; c.appendChild(i);
  }
}
</script>
</body>
</html>
